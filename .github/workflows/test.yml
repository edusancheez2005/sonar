name: Tests

# Runs the Vitest unit + component test suite on every push and on every
# pull request targeting main. Added in ORCA Copilot build step 1.
#
# The existing signal-engine prebuild test (`npm run test:engine`) is kept
# separate and runs in its own job because it has a different runtime
# (node --experimental-strip-types) and a different purpose (golden-file
# regression for the signal engine).

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  vitest:
    name: Unit + component tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  signal-engine:
    name: Signal engine golden-file regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22.6+ required for --experimental-strip-types (TypeScript
          # source import in scripts/test-signal-engine.mjs). Node 20 fails
          # with exit 9 "Invalid Argument" on the unknown flag.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run signal-engine golden tests
        run: npm run test:engine
